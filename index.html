<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Chastant Shontz">
    <meta name="description" content="Rock, paper, scissors game">
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="normalize.css">
  </head>
  <body>
    <div class="background">
      <header class="header">
      </header>
      <article class="article">
        <div class="layout instruct">
          <p class="instructTitle">Welcome to XTREME Rock, Paper, Scissors!</p>
          <p class="instructText">Choose either rock, paper, or scissors by clicking one of the three icons below:</p>
        </div>
        <div class="bothChoices">
          <div class="layout playChoice">
            <p class="playChoiceTitle">Your Choice:</p>
            <div class="choiceCont">
              <img src="img/rock.svg" alt="Rock" class="choice" class="rock" onclick="game('rock')">
              <img src="img/paper.svg" alt="Paper" class="choice" class="paper" onclick="game('paper')">
              <img src="img/scissors.svg" alt="Scissors" class="choice" class="scissors" onclick="game('scissors')">
            </div>
          </div>
          <div class="layout compChoice">
            <p class="compChoiceTitle">Opponent's Choice:</p>
            <img src="img/questionMark.svg" alt="Question mark" id="questionMark">
          </div>
        </div>
        <div class="layout results">
          <p class="resultsTitle">Score:</p>
          <div class="scoreCont">
            <div class="wins">
              <p class="winText">Wins:</p>
              <p id="winCount">0</p>
            </div>
            <div class="loses">
              <p class="loseText">Loses:</p>
              <p id="loseCount">0</p>
            </div>
            <div class="ties">
              <p class="tieText">Ties:</p>
              <p id="tieCount">0</p>
            </div>
          </div>
          <button type="reset" class="reset" onclick="reset()">Reset</button>
        </div>
      </article>
      <footer class="footer">
      </footer>
    </div>
    <script type="text/javascript" src="page.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="author" content="Chastant Shontz">
    <meta name="description" content="Rock, paper, scissors game">
    <title>Rock, Paper, Scissors</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="normalize.css">
  </head>
  <body>
    <div class="background">
      <header class="header">
      </header>
      <article class="article">
        <div class="layout instruct">
          <p class="instructTitle">Welcome to XTREME Rock, Paper, Scissors!</p>
          <p class="instructText">Choose either rock, paper, or scissors by clicking one of the three icons below:</p>
        </div>
        <div class="bothChoices">
          <div class="layout playChoice">
            <p class="playChoiceTitle">Your Choice:</p>
            <div class="choiceCont">
              <img src="img/rock.svg" alt="Rock" class="choice rock">
              <img src="img/paper.svg" alt="Paper" class="choice paper">
              <img src="img/scissors.svg" alt="Scissors" class="choice scissors">
            </div>
          </div>
          <div class="layout compChoice">
            <p class="compChoiceTitle">Opponent's Choice</p>
            <img src="img/questionMark.svg" alt="Question mark" class="questionMark">
          </div>
        </div>
        <div class="layout results">
        </div>
      </article>
      <footer class="footer">
      </footer>
    </div>
    <script type="text/javascript" src="page.js"></script>
  </body>
</html>
